<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{pageTitle}}</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="simple-card">
        <header class="hero-block hero-block-dark">
          <p class="small-text">College Mess System</p>
          <h1>Menu for {{selectedDay}}</h1>
          <p class="muted-on-dark">{{todayDate}}</p>
        </header>

        <div class="content-block">
          <section class="day-selector">
            <p class="section-label">Select Day</p>
            <div class="day-grid">
              {{dayButtons}}
            </div>
          </section>

          <section class="menu-list">
            {{menuCards}}
          </section>

          <a class="button button-secondary" href="{{backLink}}">Back to Login</a>
        </div>
      </section>
    </main>
  </body>
</html>
